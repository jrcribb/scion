<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(22, 27, 34, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      height: 40px;
      z-index: 20;
      position: relative;
    }

    #project-title {
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
    }

    #info-display {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }

    #graph-container {
      position: relative;
      width: 100%;
      height: calc(100vh - 100px);
      overflow: hidden;
    }

    #graph-container canvas {
      display: block;
    }

    #controls-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 27, 34, 0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 20;
    }

    .transport-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      height: 48px;
    }

    .transport-controls {
      display: flex;
      gap: 4px;
    }

    .transport-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #c9d1d9;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }

    .transport-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .scrubber-container {
      flex: 1;
    }

    .scrubber {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #58a6ff;
      cursor: pointer;
    }

    .scrubber::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #58a6ff;
      border: none;
      cursor: pointer;
    }

    .speed-container select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #c9d1d9;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .time-display {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .filter-panel {
      display: flex;
      gap: 24px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(22, 27, 34, 0.98);
    }

    .filter-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .filter-item input[type="checkbox"] {
      accent-color: #58a6ff;
    }

    .agent-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Per-agent colour picker in the Agents filter — a small clickable swatch. */
    .agent-color {
      width: 14px;
      height: 14px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      background: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .agent-color::-webkit-color-swatch-wrapper { padding: 0; }
    .agent-color::-webkit-color-swatch { border: none; border-radius: 50%; }
    .agent-color::-moz-color-swatch { border: none; border-radius: 50%; }

    .agent-filters,
    .event-filters {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Agent Communications transcript panel */
    .comms-panel {
      position: fixed;
      top: 52px;
      right: 12px;
      bottom: 110px;
      width: 340px;
      max-width: calc(100vw - 24px);
      display: flex;
      flex-direction: column;
      background: rgba(22, 27, 34, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow: hidden;
      z-index: 15;
    }

    .comms-panel.collapsed {
      bottom: auto;
    }

    .comms-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .comms-title {
      font-size: 12px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.3px;
    }

    .comms-subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    .comms-toggle {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c9d1d9;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .comms-toggle:hover {
      background: rgba(255,255,255,0.16);
    }

    .comms-panel.collapsed .comms-body {
      display: none;
    }

    .comms-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.18) transparent;
    }

    .comms-msg {
      padding: 8px 10px;
      margin-bottom: 7px;
      background: rgba(255,255,255,0.03);
      border-left: 3px solid #888;
      border-radius: 6px;
      animation: commsFadeIn 0.32s ease-out;
    }

    .comms-msg-bcast {
      background: rgba(34,197,94,0.10);
      box-shadow: 0 0 14px rgba(34,197,94,0.14);
    }

    .comms-msg-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .comms-time {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }

    .comms-index {
      margin-left: auto;
      font-size: 9px;
      color: rgba(255,255,255,0.3);
    }

    .comms-badge {
      background: rgba(34,197,94,0.2);
      color: #86efac;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .comms-route {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .comms-arrow {
      color: rgba(255,255,255,0.4);
    }

    .comms-type {
      font-size: 9px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: auto;
    }

    .comms-content {
      font-size: 11.5px;
      line-height: 1.45;
      color: #c9d1d9;
      word-break: break-word;
      display: none;       /* collapsed by default — click a message to expand */
      margin-top: 4px;
    }

    /* Per-message collapse: show a one-line summary until the user expands. Only messages with a
       body are expandable (a contentless handoff is just its route, so no pointer/affordance). */
    .comms-expandable .comms-msg-header { cursor: pointer; }
    .comms-msg-toggle {
      display: inline-block;
      width: 9px;
      color: rgba(255,255,255,0.45);
      transition: transform 0.12s ease;
    }
    .comms-msg.expanded .comms-msg-toggle { transform: rotate(90deg); }
    .comms-summary {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .comms-msg.expanded .comms-summary { display: none; }
    .comms-msg.expanded .comms-content { display: block; }

    /* Markdown rendered inside a comms message. Kept compact for the narrow,
       dark panel: tight margins, no first/last spacing, scrollable code. */
    .comms-content.markdown > *:first-child { margin-top: 0; }
    .comms-content.markdown > *:last-child { margin-bottom: 0; }

    .comms-content.markdown p { margin: 0 0 6px; }

    .comms-content.markdown h1,
    .comms-content.markdown h2,
    .comms-content.markdown h3,
    .comms-content.markdown h4 {
      font-weight: 700;
      line-height: 1.3;
      margin: 8px 0 4px;
      color: #e6edf3;
    }
    .comms-content.markdown h1 { font-size: 13px; }
    .comms-content.markdown h2 { font-size: 12.5px; }
    .comms-content.markdown h3 { font-size: 12px; }
    .comms-content.markdown h4 { font-size: 11.5px; }

    .comms-content.markdown ul,
    .comms-content.markdown ol {
      margin: 0 0 6px;
      padding-left: 18px;
    }
    .comms-content.markdown ul { list-style: disc; }
    .comms-content.markdown ol { list-style: decimal; }
    .comms-content.markdown li { margin: 1px 0; }

    .comms-content.markdown strong { color: #e6edf3; font-weight: 700; }
    .comms-content.markdown em { font-style: italic; }

    .comms-content.markdown a {
      color: #58a6ff;
      text-decoration: none;
    }
    .comms-content.markdown a:hover { text-decoration: underline; }

    .comms-content.markdown code {
      font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10.5px;
      background: rgba(255,255,255,0.08);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .comms-content.markdown pre {
      margin: 0 0 6px;
      padding: 7px 9px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 5px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .comms-content.markdown pre code {
      background: none;
      padding: 0;
      font-size: 10.5px;
      line-height: 1.4;
    }

    .comms-content.markdown blockquote {
      margin: 0 0 6px;
      padding-left: 8px;
      border-left: 2px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.65);
    }

    .comms-content.markdown table {
      border-collapse: collapse;
      margin: 0 0 6px;
      font-size: 10.5px;
    }
    .comms-content.markdown th,
    .comms-content.markdown td {
      border: 1px solid rgba(255,255,255,0.12);
      padding: 2px 6px;
    }

    .comms-content.markdown hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 8px 0;
    }

    @keyframes commsFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="header">
    <span id="project-title">Agent Visualizer</span>
    <span id="info-display"></span>
  </div>
  <div id="graph-container"></div>
  <div id="controls-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
